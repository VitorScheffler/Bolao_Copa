<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa do Mundo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- TELA DE LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="login-logo">
        <span class="logo-icon">⚽</span>
        <h1>Bolão Copa do Mundo</h1>
        <p>Fase de grupos · 12 grupos · 72 jogos</p>
      </div>
      <div class="login-card">
        <h2>Entrar no bolão</h2>
        <div class="field-group">
          <label>Seu nome</label>
          <input type="text" id="login-name" placeholder="Digite seu nome..." maxlength="32" autocomplete="off">
        </div>
        <button class="btn btn-primary btn-full" onclick="login()">Entrar</button>
        <div id="login-error" class="error-msg" style="display:none"></div>
      </div>
      <div class="login-users" id="login-users-list"></div>
    </div>
  </div>

  <!-- TELA PRINCIPAL -->
  <div id="screen-main" class="screen">

    <header class="main-header">
      <div class="header-left">
        <span class="logo-sm">⚽</span>
        <span class="app-title">Bolão Copa do Mundo</span>
      </div>
      <div class="header-center">
        <nav class="main-nav">
          <button class="nav-btn active" data-view="meus-palpites" onclick="setView('meus-palpites', this)">Meus Palpites</button>
          <button class="nav-btn" data-view="comparar" onclick="setView('comparar', this)">Comparar</button>
        </nav>
      </div>
      <div class="header-right">
        <div class="user-badge" id="user-badge"></div>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <main class="main-content">

      <!-- VIEW: MEUS PALPITES -->
      <div id="view-meus-palpites" class="view active">
        <div class="view-header">
          <h2>Meus Palpites</h2>
          <div class="view-actions">
            <span id="progress-label" class="progress-label"></span>
            <button class="btn btn-primary btn-sm" onclick="saveAll()">💾 Salvar tudo</button>
          </div>
        </div>
        <div id="groups-grid" class="groups-grid"></div>
      </div>

      <!-- VIEW: COMPARAR -->
      <div id="view-comparar" class="view">
        <div class="view-header">
          <h2>Comparar Palpites</h2>
        </div>
        <div id="compare-content"></div>
      </div>

    </main>
  </div>

</div>

<div id="toast" class="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
